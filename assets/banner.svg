<svg viewBox="0 0 1600 578" xmlns="http://www.w3.org/2000/svg" font-family="&apos;DejaVu Sans Mono&apos;,&apos;Liberation Mono&apos;,Consolas,monospace">
<defs>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3.2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
    <rect width="4" height="2" fill="#000000"/>
    <rect y="2" width="4" height="2" fill="#001a00"/>
  </pattern>
  <radialGradient id="vignette" cx="50%" cy="45%" r="75%">
    <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>
</defs>
<style>

@keyframes flicker {
