<rect x="0" y="0" width="1600" height="578" fill="#020a02"/>
<g id="scan-layer"><rect x="-10" y="-10" width="1620" height="638" fill="url(#scanlines)" opacity="0.5"/></g>
<g id="crt-content" filter="url(#glow)">
<g class="line0"><text x="70" y="82" font-size="52" font-weight="bold" fill="#3dff5c" xml:space="preserve">GEMV.ASM</text></g>
<g class="line1"><text x="72" y="112" font-size="15" fill="#1a8a2e" letter-spacing="2" xml:space="preserve">HAND-WRITTEN X86-64 SIMD KERNEL  //  AVX2 + FMA  //  NASM</text></g>
<g class="line2"><text x="70" y="138" font-size="20" fill="#1a8a2e" xml:space="preserve">+--------+--------+--------+--------+--------+--------+--------+--------+--------+--------+--------+--------+--------+.</text></g>
<g class="line3"><text x="70" y="178" font-size="20" fill="#3dff5c" xml:space="preserve">DO                                            GEMV kernel entry point</text></g>
<g class="line4"><text x="70" y="208" font-size="20" fill="#3dff5c" xml:space="preserve">   USING YMM,8                                8 lanes of fp32 per register</text></g>
<g class="line5"><text x="70" y="238" font-size="20" fill="#3dff5c" xml:space="preserve">   DO UNTIL=(GE,I,COLS_ALIGNED)               Vectorized loop, 8 cols per iteration</text></g>
<g class="line6"><text x="70" y="268" font-size="20" fill="#3dff5c" xml:space="preserve">      VFMADD231PS YMM0,YMM1,YMM2              Fused multiply-add, one cycle per iter</text></g>
<g class="line7"><text x="70" y="298" font-size="20" fill="#3dff5c" xml:space="preserve">   COMPARE SUM,VS=MATVEC_SCALAR               Baseline: one lane per instruction</text></g>
<g class="line8"><text x="70" y="328" font-size="20" fill="#3dff5c" xml:space="preserve">   SELECT CLI,MATRIX_SIZE                     Cache-resident or bandwidth-bound?</text></g>
<g class="line9"><text x="70" y="358" font-size="20" fill="#3dff5c" xml:space="preserve">      WHEN (SMALL)  RESULT SPEEDUP=11.6X      64x64, stays in L1/L2 cache</text></g>
<g class="line10"><text x="70" y="388" font-size="20" fill="#3dff5c" xml:space="preserve">      WHEN (LARGE)  RESULT SPEEDUP=6.5X       4096x4096, memory-bandwidth bound</text></g>
<g class="line11"><text x="70" y="418" font-size="20" fill="#3dff5c" xml:space="preserve">RETURN                                        System V AMD64 ABI, called from C</text></g>
<g class="line12"><text x="70" y="454" font-size="20" fill="#1a8a2e" xml:space="preserve">+--------+--------+--------+--------+--------+--------+--------+--------+--------+--------+--------+--------+--------+.</text></g>
<g class="line13"><text x="70" y="492" font-size="15" fill="#1a8a2e" letter-spacing="1" xml:space="preserve">measured: 6.5x-11.6x faster than scalar  //  src/matvec_simd.asm  //  src/matvec_scalar.asm</text></g>
<g class="line14"><text x="70" y="536" font-size="19" fill="#3dff5c" xml:space="preserve">root@gemv-asm:~$ </text></g>
<g class="cursor-wrap"><rect class="cursor" x="274.3" y="520" width="11" height="19" fill="#3dff5c"/></g>
</g>
