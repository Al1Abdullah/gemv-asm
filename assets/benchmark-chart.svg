<svg viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','SF Mono',Consolas,'Courier New',monospace">

<rect x="0" y="0" width="1200" height="640" fill="#0b0d12"/>

<text x="64" y="46" font-size="22" font-weight="600" fill="#e6edf3">SIMD Speedup over Scalar Baseline</text>
<text x="64" y="68" font-size="13" fill="#8b949e">GEMV kernel &#183; AVX2 + FMA vs naive scalar, measured</text>

<rect x="980" y="30" width="10" height="10" fill="#58a6ff"/>
<text x="996" y="39" font-size="11.5" fill="#8b949e">measured</text>
<rect x="980" y="48" width="10" height="10" fill="#30363d"/>
<text x="996" y="57" font-size="11.5" fill="#8b949e">noise outlier</text>

<g stroke="#1c2128" stroke-width="1">
<line x1="160" y1="110" x2="160" y2="576"/>
<line x1="320" y1="110" x2="320" y2="576"/>
<line x1="480" y1="110" x2="480" y2="576"/>
<line x1="640" y1="110" x2="640" y2="576"/>
<line x1="800" y1="110" x2="800" y2="576"/>
<line x1="960" y1="110" x2="960" y2="576"/>
<line x1="1120" y1="110" x2="1120" y2="576"/>
</g>

<line x1="800" y1="100" x2="800" y2="576" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.7"/>
<text x="800" y="92" font-size="11.5" fill="#58a6ff" text-anchor="middle">8&#215; ceiling (256-bit / fp32)</text>

<line x1="160" y1="576" x2="1120" y2="576" stroke="#30363d" stroke-width="1.5"/>
<g font-size="11.5" fill="#6e7681" text-anchor="middle">
<text x="160" y="596">0&#215;</text>
<text x="320" y="596">2&#215;</text>
<text x="480" y="596">4&#215;</text>
<text x="640" y="596">6&#215;</text>
<text x="800" y="596">8&#215;</text>
<text x="960" y="596">10&#215;</text>
<text x="1120" y="596">12&#215;</text>
</g>

<g>
<text x="150" y="158" font-size="13" fill="#8b949e" text-anchor="end">64&#215;64</text>
<rect x="160" y="140" width="929.6" height="28" rx="2" fill="#58a6ff"/>
<text x="1099.6" y="158" font-size="13" font-weight="600" fill="#e6edf3">11.62&#215;</text>
</g>

<g>
<text x="150" y="212" font-size="13" fill="#8b949e" text-anchor="end">128&#215;128</text>
<rect x="160" y="194" width="859.2" height="28" rx="2" fill="#58a6ff"/>
<text x="1029.2" y="212" font-size="13" font-weight="600" fill="#e6edf3">10.74&#215;</text>
</g>

<g>
<text x="150" y="266" font-size="13" fill="#8b949e" text-anchor="end">256&#215;256</text>
<rect x="160" y="248" width="390.4" height="28" rx="2" fill="#30363d"/>
<text x="560.4" y="266" font-size="13" font-weight="600" fill="#8b949e">4.88&#215; (noise)</text>
</g>

<g>
<text x="150" y="320" font-size="13" fill="#8b949e" text-anchor="end">512&#215;512</text>
<rect x="160" y="302" width="637.6" height="28" rx="2" fill="#58a6ff"/>
<text x="807.6" y="320" font-size="13" font-weight="600" fill="#e6edf3">7.97&#215;</text>
</g>

<g>
<text x="150" y="374" font-size="13" fill="#8b949e" text-anchor="end">1024&#215;1024</text>
<rect x="160" y="356" width="689.6" height="28" rx="2" fill="#58a6ff"/>
<text x="859.6" y="374" font-size="13" font-weight="600" fill="#e6edf3">8.62&#215;</text>
</g>

<g>
<text x="150" y="428" font-size="13" fill="#8b949e" text-anchor="end">2048&#215;2048</text>
<rect x="160" y="410" width="607.2" height="28" rx="2" fill="#58a6ff"/>
<text x="777.2" y="428" font-size="13" font-weight="600" fill="#e6edf3">7.59&#215;</text>
</g>

<g>
<text x="150" y="482" font-size="13" fill="#8b949e" text-anchor="end">4096&#215;4096</text>
<rect x="160" y="464" width="520.0" height="28" rx="2" fill="#58a6ff"/>
<text x="690.0" y="482" font-size="13" font-weight="600" fill="#e6edf3">6.50&#215;</text>
</g>

<g>
<text x="150" y="536" font-size="13" fill="#8b949e" text-anchor="end">4096&#215;1000</text>
<rect x="160" y="518" width="592.0" height="28" rx="2" fill="#58a6ff"/>
<text x="762.0" y="536" font-size="13" font-weight="600" fill="#e6edf3">7.40&#215;</text>
</g>

<text x="64" y="620" font-size="11.5" fill="#6e7681">Averaged over hundreds&#8211;thousands of iterations per size. Compute-bound near 8&#215; ceiling at small sizes &#8594; bandwidth-bound as matrices outgrow cache.</text>

</svg>
